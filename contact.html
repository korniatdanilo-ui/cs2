<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-hero {
            background-image: url("img/cs2.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 40vh;
            color: white;
            display: flex;
            justify-content: center;
            flex-direction: column;
        }

        .contact-section {
            padding: 60px 20px;
            text-align: center;
        }

        .contact-section h2 {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .contact-form {
            background-color: white;
            max-width: 550px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: left;
        }

        .contact-form label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: orange;
            outline: none;
        }

        .contact-form textarea {
            height: 130px;
            resize: vertical;
        }

        .contact-form button {
            background-color: orangered;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Bungee', cursive;
            font-size: 1rem;
            width: 100%;
        }

        .contact-form button:hover {
            background-color: darkorange;
        }

        .contact-details {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 40px 20px;
        }

        .contact-detail-card {
            background-color: white;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 200px;
            text-align: center;
        }

        .contact-detail-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: orangered;
        }

        .contact-detail-card p {
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            color: #333;
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <img src="./img/cs.png" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#skins">Skins</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-hero">
            <h1>Contact Us</h1>
            <p>We are always happy to help</p>
        </section>

        <div class="contact-details">
            <div class="contact-detail-card">
                <h3>Phone</h3>
                <p>+666 666 666</p>
            </div>
            <div class="contact-detail-card">
                <h3>Email</h3>
                <p>support@cs2skins.com</p>
            </div>
            <div class="contact-detail-card">
                <h3>Hours</h3>
                <p>Mon–Sun 24/7</p>
            </div>
        </div>

        <section class="contact-section">
            <h2>Send Us a Message</h2>
            <form class="contact-form" onsubmit="handleSubmit(event)">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" required>

                <label for="email">Your Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Write your message here..." required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <p class="contact-info">if you have any questions, please call +666 666 666</p>
    </main>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            alert("Дякуємо! Ваше повідомлення надіслано.");
            e.target.reset();
        }
    </script>
</body>
</html>
