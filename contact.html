<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <style>
        
    </style>
</head>
<body>
    <header>
        <img src="./img/cs.png" alt="Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#skins">Skins</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-hero">
            <h1>Contact Us</h1>
            <p>We are always happy to help</p>
        </section>

        <div class="contact-details">
            <div class="contact-detail-card">
                <h3>Phone</h3>
                <p>+351 937700591</p>
            </div>
            <div class="contact-detail-card">
                <h3>Email</h3>
                <p>supportcsskins@gmail.com</p>
            </div>
            <div class="contact-detail-card">
                <h3>Hours</h3>
                <p>Sun, Sat 24/7</p>
            </div>
        </div>

        <section class="contact-section">
            <h2>Send Us a Message</h2>
            <form class="contact-form" onsubmit="handleSubmit(event)">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="John Doe" required>

                <label for="email">Your Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Write your message here..." required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <p class="contact-info">if you have any questions, please call +351 937700591</p>
    </main>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            alert("Дякуємо! Ваше повідомлення надіслано.");
            e.target.reset();
        }
    </script>
</body>
</html>
